name: PDF・画像→seminars.json 自動更新

on:
  push:
    paths:
      - 'project/seminars/*.pdf'
      - 'project/seminars/*.jpg'
      - 'project/seminars/*.JPG'
      - 'project/seminars/*.jpeg'
      - 'project/seminars/*.JPEG'
      - 'project/seminars/*.png'
      - 'project/seminars/*.PNG'
      - 'project/seminars/*.webp'
      - 'project/seminars/*.WEBP'
  workflow_dispatch:   # 手動実行ボタン（管理ページからも起動）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run update script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/update_seminars.py

      - name: Commit updated seminars.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project/seminars/seminars.json scripts/.seminars_cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: seminars.json をチラシ（PDF/画像）から自動更新"
            git push
          fi
